<script>let hn=document.getElementById('hn'),fm=document.getElementById('fm'),ce=document.getElementById('cele'),by=document.getElementById('by'),bn=document.getElementById('bn'),m2=document.getElementById('fm2'),fs=document.getElementById('fs'),cv=document.getElementById('cv'),vp=document.getElementById('vp'),nc=0;function sp(){const e=['💖','✨','🌸','🎉','💕','🌹','🥰','💗','🎊','💝'];for(let i=0;i<30;i++)setTimeout(()=>{const o=document.createElement('div');o.className='spr';o.textContent=e[Math.floor(Math.random()*e.length)];o.style.left=(Math.random()*80+10)+'%';o.style.top=(Math.random()*50+25)+'%';document.body.appendChild(o);setTimeout(()=>o.remove(),1400)},i*80)}by.addEventListener('click',()=>{const n=hn.value.trim()||'丫头';m2.textContent=n+'，我爱你 💕';fs.textContent='这一刻，我会一直记得';fm.classList.add('hidden');ce.classList.add('show');sp();cv.style.display='block';vp.style.display='none';cv.play().then(()=>{}).catch(()=>{vp.style.display='flex';cv.style.display='none'})});bn.addEventListener('mouseenter',function(){this.style.transition='transform 0.08s';this.style.transform='translate('+(Math.random()*360-180)+'px,'+(Math.random()*200-100)+'px)'});bn.addEventListener('click',function(e){e.stopPropagation();nc++;const s=1+nc*0.5;by.style.transform='scale('+s+')';by.style.transition='transform 0.3s';if(s>=3.5){bn.style.transform+=' scale(0.01)';bn.style.opacity='0.3';bn.style.pointerEvents='none'}});hn.addEventListener('keydown',(e)=>{if(e.key==='Enter')by.click()});</script></body></html>
